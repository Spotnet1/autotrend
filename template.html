<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ title }} | Intelligence Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --surface-low: rgba(15, 23, 42, 0.7);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --secondary: #ec4899;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --positive: #10b981;
            --negative: #ef4444;
            --neutral: #64748b;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Modern Background */
        .bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.08) 0%, transparent 40%);
        }

        /* Mobile Header */
        header {
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--positive);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 99px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-dot {
            width: 5px; height: 5px; background: var(--positive);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--positive);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        main {
            padding: 1.5rem;
            padding-bottom: 6rem; /* Space for bottom nav */
            max-width: 800px;
            margin: 0 auto;
        }

        /* Hero / Stats Row */
        .hero {
            margin-bottom: 2.5rem;
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 0.75rem;
            letter-spacing: -0.03em;
        }

        .stats-scroller {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .stats-scroller::-webkit-scrollbar { display: none; }

        .stat-item {
            flex: 0 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            min-width: 140px;
        }

        .stat-val { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }

        /* Search & Filters */
        .search-container {
            margin-bottom: 2rem;
            position: sticky;
            top: 4.5rem;
            z-index: 900;
        }

        .search-box {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        /* Horizontal Category Scroller */
        .category-scroller {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            padding: 0.25rem;
            scrollbar-width: none;
        }
        .category-scroller::-webkit-scrollbar { display: none; }

        .cat-pill {
            flex: 0 0 auto;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 0.5rem 1.25rem;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cat-pill.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        /* Feed Grid */
        .feed-grid {
            display: grid;
            gap: 1.25rem;
        }

        .article-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
            position: relative;
        }

        .article-card:active { transform: scale(0.98); }

        .card-header {
            padding: 1.25rem;
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .source-tag {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.05em;
        }

        .trending-hit {
            background: linear-gradient(to right, #f59e0b, #ef4444);
            color: white;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 0.2rem 0.5rem;
            border-radius: 0.4rem;
            text-transform: uppercase;
        }

        .card-body { padding: 1.25rem; padding-top: 0; }
        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.75rem;
        }
        .card-title a { color: inherit; text-decoration: none; }
        
        .card-summary {
            font-size: 0.9rem;
            color: var(--text-dim);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.1);
        }

        .meta-group { display: flex; flex-direction: column; gap: 0.2rem; }
        .date { font-size: 0.75rem; color: var(--text-dim); }

        .virality {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 800;
        }

        /* Bottom Nav */
        nav.bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 0.5rem calc(0.75rem + var(--safe-area-bottom));
            z-index: 1001;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.2rem; }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal { animation: slideUp 0.4s ease forwards; }

        /* Keyword Cloud - Bottom Sheet Style */
        .kw-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 2rem;
            padding: 1rem;
            background: var(--surface-low);
            border-radius: 1.25rem;
            border: 1px solid var(--border);
        }
        .kw-tag {
            background: rgba(255,255,255,0.05);
            padding: 0.4rem 0.8rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="bg-blur"></div>

    <header>
        <div class="logo">Auto<span>Trend</span></div>
        <div class="status-badge">
            <div class="status-dot"></div>
            LIVE
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Intelligence<br>Simplified.</h1>
            <p style="color: var(--text-dim); font-size: 0.9rem;">{{ tagline }}</p>
        </section>

        <div class="stats-scroller">
            <div class="stat-item">
                <div class="stat-val">{{ stats.total }}</div>
                <div class="stat-label">Feed Total</div>
            </div>
            <div class="stat-item">
                <div class="stat-val">{{ stats.trending }}</div>
                <div class="stat-label">Trending</div>
            </div>
            <div class="stat-item">
                <div class="stat-val">{{ stats.sources }}</div>
                <div class="stat-label">Sources</div>
            </div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search trends..." oninput="renderCards()">
            </div>
        </div>

        <div class="category-scroller" id="catPills"></div>

        <div class="feed-grid" id="cardGrid"></div>

        <div class="kw-cloud" id="kwCloud"></div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="setTrend('all')">
            <span class="nav-icon">🌐</span>
            <span>Feed</span>
        </a>
        <a href="#" class="nav-item" onclick="setTrend('trending')">
            <span class="nav-icon">🔥</span>
            <span>Hot</span>
        </a>
        <a href="trending.rss" class="nav-item">
            <span class="nav-icon">📡</span>
            <span>RSS</span>
        </a>
    </nav>

    <script>
        const ARTICLES = {{ articles_json }};
        const KW_DATA = {{ kw_json }};

        let activeCategory = 'all';
        let activeTrend = 'all';

        (function init() {
            // Build Categories
            const cats = ['all', ...new Set(ARTICLES.map(a => a.category))];
            const catWrap = document.getElementById('catPills');
            cats.forEach(c => {
                const div = document.createElement('div');
                div.className = 'cat-pill' + (c === 'all' ? ' active' : '');
                div.textContent = c === 'all' ? 'Everything' : c;
                div.onclick = () => {
                    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
                    div.classList.add('active');
                    activeCategory = c;
                    renderCards();
                };
                catWrap.appendChild(div);
            });

            // Build Keywords
            const kwWrap = document.getElementById('kwCloud');
            KW_DATA.slice(0, 15).forEach(([kw, count]) => {
                const span = document.createElement('span');
                span.className = 'kw-tag';
                span.textContent = `#${kw}`;
                span.onclick = () => {
                    document.getElementById('searchInput').value = kw;
                    renderCards();
                };
                kwWrap.appendChild(span);
            });

            renderCards();
        })();

        function setTrend(val) {
            activeTrend = val;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(val === 'all') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(val === 'trending') document.querySelectorAll('.nav-item')[1].classList.add('active');
            renderCards();
        }

        function renderCards() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            let filtered = ARTICLES.filter(a => {
                if (activeCategory !== 'all' && a.category !== activeCategory) return false;
                if (activeTrend === 'trending' && !a.is_trending) return false;
                if (q) {
                    const blob = (a.title + ' ' + a.summary + ' ' + a.source).toLowerCase();
                    if (!blob.includes(q)) return false;
                }
                return true;
            });

            const grid = document.getElementById('cardGrid');
            if (!filtered.length) {
                grid.innerHTML = '<div style="text-align:center; padding: 3rem; color: var(--text-dim);">No data found.</div>';
                return;
            }

            grid.innerHTML = filtered.slice(0, 50).map((a, i) => `
                <article class="article-card reveal" style="animation-delay: ${i * 0.05}s">
                    <div class="card-header">
                        <span class="source-tag">${esc(a.source)}</span>
                        ${a.is_trending ? '<span class="trending-hit">Trending</span>' : ''}
                    </div>
                    <div class="card-body">
                        <h2 class="card-title"><a href="${esc(a.url)}" target="_blank">${esc(a.title)}</a></h2>
                        <p class="card-summary">${esc(a.summary)}</p>
                    </div>
                    <div class="card-footer">
                        <div class="meta-group">
                            <span class="date">${a.category}</span>
                        </div>
                        <div class="virality" style="border-color: ${a.virality_score > 70 ? 'var(--secondary)' : 'var(--accent)'}">
                            ${a.virality_score}
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
