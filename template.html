<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ title }} | Global Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010409;
            --surface: #0d1117;
            --surface-hover: #161b22;
            --accent: #2f81f7;
            --accent-glow: rgba(47, 129, 247, 0.3);
            --secondary: #d2a8ff;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border: #30363d;
            --positive: #3fb950;
            --negative: #f85149;
            --neutral: #8b949e;
            --hot: #ff7b72;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.4;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header & Radar ── */
        header {
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(1, 4, 9, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }

        /* Radar scan effect in header */
        header::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(47, 129, 247, 0.1) 80%, rgba(47, 129, 247, 0.4) 100%);
            animation: radarSpin 4s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        @keyframes radarSpin { 100% { transform: rotate(360deg); } }

        .header-left, .header-right {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .header-right { align-items: flex-end; }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .logo span { color: var(--accent); }

        .utc-clock {
            font-family: 'Outfit', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.05em;
        }

        .last-updated {
            font-size: 0.6rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.55rem;
            font-weight: 900;
            color: var(--positive);
            background: rgba(63, 185, 80, 0.1);
            padding: 0.15rem 0.5rem;
            border-radius: 99px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 5px; height: 5px; background: var(--positive);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        main {
            padding: 1rem;
            padding-bottom: 5rem;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ── Powerful Hero Section ── */
        .hero {
            margin: 0 0 2.5rem;
            text-align: center;
            padding: 3rem 1rem;
            position: relative;
            background: radial-gradient(circle at center, rgba(47, 129, 247, 0.15) 0%, transparent 70%),
                        linear-gradient(180deg, rgba(13,17,23,0) 0%, var(--bg) 100%),
                        repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(255,255,255,0.03) 20px),
                        repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(255,255,255,0.03) 20px);
            border-bottom: 1px solid rgba(47, 129, 247, 0.2);
            border-radius: 0 0 2rem 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(47, 129, 247, 0.6);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        
        .hero p {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ── Top Trending Vertical Scroller (Inline) ── */
        .top-tags-container {
            margin-bottom: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            max-height: 120px;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .top-tags-container::-webkit-scrollbar { display: none; }

        /* ── Predictive & Breaking Elements ── */
        .breaking-banner {
            background: rgba(248, 81, 73, 0.1);
            color: var(--negative);
            font-size: 0.6rem;
            font-weight: 900;
            padding: 0.3rem 0.5rem;
            border-radius: 0.25rem;
            border: 1px solid rgba(248, 81, 73, 0.3);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .tag-list-header {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .vertical-tag-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .vertical-tag-item:last-child { border-bottom: none; }
        .tag-rank { color: var(--accent); font-family: 'Outfit', sans-serif; width: 25px; }
        .tag-name { flex: 1; margin-left: 0.5rem; }
        .tag-count { color: var(--text-dim); font-size: 0.75rem; }

        /* ── Search ── */
        .search-container {
            margin-bottom: 1.5rem;
            position: sticky;
            top: 4rem;
            z-index: 900;
        }

        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        /* ── Category Scroller ── */
        .cat-scroller {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            padding: 0.1rem;
            scrollbar-width: none;
        }
        .cat-scroller::-webkit-scrollbar { display: none; }

        .cat-pill {
            flex: 0 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
        }

        .cat-pill.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* ── Feed Grid ── */
        .feed-grid {
            display: grid;
            gap: 0.75rem;
        }

        .article-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: background 0.2s;
        }
        .article-card:active { background: var(--surface-hover); }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .source-name {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .trending-badge {
            background: var(--hot);
            color: var(--bg);
            font-size: 0.55rem;
            font-weight: 900;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }
        .card-title a { color: inherit; text-decoration: none; }

        /* ── Card Analytics ── */
        .card-analytics {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
            background: rgba(255,255,255,0.03);
            padding: 0.5rem;
            border-radius: 0.5rem;
        }

        .analytic-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .analytic-label {
            font-size: 0.5rem;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        .analytic-value {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .sentiment-bar-bg {
            height: 4px;
            background: #21262d;
            border-radius: 2px;
            overflow: hidden;
            width: 100%;
        }

        .sentiment-bar-fill { height: 100%; border-radius: 2px; }
        .sentiment-bar-fill.positive { background: var(--positive); }
        .sentiment-bar-fill.negative { background: var(--negative); }
        .sentiment-bar-fill.neutral { background: var(--neutral); }

        .keyword-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
        }

        .ent-chip {
            font-size: 0.55rem;
            font-weight: 800;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .ent-gpe { background: rgba(248, 81, 73, 0.1); color: #ff7b72; border: 1px solid rgba(248, 81, 73, 0.2); }
        .ent-org { background: rgba(47, 129, 247, 0.1); color: #79c0ff; border: 1px solid rgba(47, 129, 247, 0.2); }
        .ent-per { background: rgba(210, 168, 255, 0.1); color: #d2a8ff; border: 1px solid rgba(210, 168, 255, 0.2); }
        .ent-kw  { background: rgba(139, 148, 158, 0.1); color: #8b949e; border: 1px solid rgba(139, 148, 158, 0.2); }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .score-indicator {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        .sentiment-dot { width: 6px; height: 6px; border-radius: 50%; }
        .sentiment-dot.positive { background: var(--positive); box-shadow: 0 0 8px var(--positive); }
        .sentiment-dot.negative { background: var(--negative); box-shadow: 0 0 8px var(--negative); }
        .sentiment-dot.neutral { background: var(--neutral); }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-top: 2.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
        }

        .page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-btn:not(:disabled):hover { border-color: var(--accent); }

        /* ── Bottom Nav ── */
        nav.bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 0.5rem calc(0.75rem + var(--safe-area-bottom));
            z-index: 1001;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.1rem; }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fadeInUp 0.3s ease forwards; }

    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">Spot<span>Pulse</span> Global</div>
            <div class="utc-clock" id="utcClock">00:00:00 UTC</div>
        </div>
        <div class="header-right">
            <div class="last-updated">Last Refresh: {{ updated }}</div>
            <div class="status-badge">
                <div class="status-dot"></div>
                Live
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>GLOBAL THREAT MATRIX</h1>
            <p>Autonomous AI Intelligence Engine</p>
        </section>

        <div class="tag-list-header">
            <span>Emerging Signatures (Velocity + Volume)</span>
            <span>Signal Strength</span>
        </div>
        <div class="top-tags-container" id="trendingTags">
            <!-- Trending tags vertical list -->
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Analyze global trends..." oninput="resetPaginationAndRender()">
            </div>
        </div>

        <div class="cat-scroller" id="catPills"></div>

        <div class="feed-grid" id="cardGrid"></div>

        <div class="pagination" id="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">Previous</button>
            <span id="pageInfo">Page 1 of 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" id="navFeed" onclick="setMode('all')">
            <span class="nav-icon">🌐</span>
            <span>Global</span>
        </a>
        <a href="#" class="nav-item" id="navHot" onclick="setMode('hot')">
            <span class="nav-icon">🔥</span>
            <span>Hot</span>
        </a>
        <a href="#" class="nav-item" id="navAmericas" onclick="setCatByName('🇺🇸 Americas')">
            <span class="nav-icon">🌎</span>
            <span>Americas</span>
        </a>
        <a href="#" class="nav-item" id="navEuro" onclick="setCatByName('🇪🇺 Europe')">
            <span class="nav-icon">🇪🇺</span>
            <span>Europe</span>
        </a>
        <a href="#" class="nav-item" id="navAsia" onclick="setCatByName('🌏 Asia & Pacific')">
            <span class="nav-icon">🌏</span>
            <span>Asia</span>
        </a>
    </nav>

    <script>
        const ARTICLES = {{ articles_json }};
        const KW_DATA = {{ kw_json }};

        // Custom Category Order
        const CAT_ORDER = [
            "🌍 Geopolitics",
            "🇺🇸 Americas",
            "🇪🇺 Europe",
            "🌏 Asia & Pacific",
            "🌍 Africa & Mid-East",
            "💻 Technology & AI",
            "📈 Finance & Markets",
            "🔬 Science & Climate"
        ];

        let activeCategory = 'all';
        let activeMode = 'all'; // all or hot
        let currentPage = 1;
        const ITEMS_PER_PAGE = 20;

        (function init() {
            // Live UTC Clock
            setInterval(() => {
                const now = new Date();
                document.getElementById('utcClock').textContent = 
                    now.getUTCHours().toString().padStart(2, '0') + ":" +
                    now.getUTCMinutes().toString().padStart(2, '0') + ":" +
                    now.getUTCSeconds().toString().padStart(2, '0') + " UTC";
            }, 1000);

            // Build Tags Vertical List
            const tagWrap = document.getElementById('trendingTags');
            KW_DATA.slice(0, 30).forEach(([kw, count], i) => {
                const div = document.createElement('div');
                div.className = 'vertical-tag-item';
                div.innerHTML = `
                    <span class="tag-rank">${i+1}</span>
                    <span class="tag-name">#${kw}</span>
                    <span class="tag-count">${count}</span>
                `;
                div.onclick = () => {
                    document.getElementById('searchInput').value = kw;
                    resetPaginationAndRender();
                };
                tagWrap.appendChild(div);
            });

            // Build Categories (Ordered)
            const availableCats = [...new Set(ARTICLES.map(a => a.category))];
            const sortedCats = ['all', ...CAT_ORDER.filter(c => availableCats.includes(c))];
            // Add remaining cats
            availableCats.forEach(c => {
                if(!sortedCats.includes(c)) sortedCats.push(c);
            });

            const catWrap = document.getElementById('catPills');
            sortedCats.forEach(c => {
                const div = document.createElement('div');
                div.className = 'cat-pill' + (c === 'all' ? ' active' : '');
                div.textContent = c === 'all' ? 'Everything' : c;
                div.onclick = () => setCat(div, c);
                catWrap.appendChild(div);
            });

            render();
        })();

        function setCat(el, c) {
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            activeCategory = c;
            resetPaginationAndRender();
        }

        function setCatByName(name) {
            const pills = document.querySelectorAll('.cat-pill');
            pills.forEach(p => {
                if(p.textContent === name) {
                    p.click();
                }
            });
        }

        function setMode(mode) {
            activeMode = mode;
            document.getElementById('navFeed').classList.toggle('active', mode === 'all');
            document.getElementById('navHot').classList.toggle('active', mode === 'hot');
            resetPaginationAndRender();
        }

        function resetPaginationAndRender() {
            currentPage = 1;
            render();
        }

        function changePage(delta) {
            currentPage += delta;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function render() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            let filtered = ARTICLES.filter(a => {
                if (activeCategory !== 'all' && a.category !== activeCategory) return false;
                if (activeMode === 'hot' && !a.is_trending) return false;
                if (q) {
                    const blob = (a.title + ' ' + a.summary + ' ' + a.source).toLowerCase();
                    if (!blob.includes(q)) return false;
                }
                return true;
            });

            // Sort logic: Trending first, then by score
            filtered.sort((a, b) => {
                if (a.is_trending !== b.is_trending) return a.is_trending ? -1 : 1;
                return b.virality_score - a.virality_score;
            });

            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const paginated = filtered.slice(start, start + ITEMS_PER_PAGE);

            const grid = document.getElementById('cardGrid');
            if (!paginated.length) {
                grid.innerHTML = '<div style="text-align:center; padding: 4rem; color: var(--text-dim);">No signals detected.</div>';
            } else {
                grid.innerHTML = paginated.map((a, i) => {
                    const sentimentPct = a.sentiment === 'positive' ? 85 : (a.sentiment === 'negative' ? 25 : 50);

                    return `
                    <article class="article-card reveal" style="animation-delay: ${i * 0.05}s; border-color: ${a.impact_level === 'CRITICAL' ? 'rgba(248,81,73,0.4)' : 'var(--border)'}">
                        ${a.is_breaking ? '<div class="breaking-banner"><div class="status-dot" style="background:var(--negative)"></div> VELOCITY SURGE: EMERGING THREAT/TREND DETECTED</div>' : ''}
                        <div class="card-top">
                            <span class="source-name">${esc(a.source)} • <span style="color:var(--text-dim)">Global Matrix</span></span>
                            ${a.is_trending ? `<span class="trending-badge" style="background: ${a.impact_level === 'CRITICAL' ? 'var(--negative)' : (a.impact_level === 'HIGH' ? 'var(--hot)' : 'var(--accent)')}">${esc(a.impact_level || 'ELEVATED')}</span>` : ''}
                        </div>
                        <div class="card-title"><a href="${esc(a.url)}" target="_blank">${esc(a.title)}</a></div>
                        
                        <div class="card-analytics">
                            <div class="analytic-item">
                                <span class="analytic-label">SENTIMENT</span>
                                <div class="sentiment-bar-bg">
                                    <div class="sentiment-bar-fill ${a.sentiment}" style="width: ${sentimentPct}%"></div>
                                </div>
                            </div>
                            <div class="analytic-item">
                                <span class="analytic-label">VIRALITY</span>
                                <span class="analytic-value">${a.virality_score}%</span>
                            </div>
                        </div>

                        <div class="keyword-row">
                            ${(a.entities?.gpe || []).slice(0,2).map(e => `<span class="ent-chip ent-gpe">📍 ${esc(e)}</span>`).join('')}
                            ${(a.entities?.orgs || []).slice(0,2).map(e => `<span class="ent-chip ent-org">🏢 ${esc(e)}</span>`).join('')}
                            ${(a.entities?.persons || []).slice(0,1).map(e => `<span class="ent-chip ent-per">👤 ${esc(e)}</span>`).join('')}
                            ${(a.entities?.keywords || []).slice(0,3).map(e => `<span class="ent-chip ent-kw">${esc(e)}</span>`).join('')}
                        </div>

                        <div class="card-meta">
                            <span>${esc(a.category)}</span>
                            <span style="font-family:'Outfit'; font-weight:800; color:var(--text-main)">REF: ${a.id.slice(0,6)}</span>
                        </div>
                    </article>
                `}).join('');
            }

            // Pagination Controls
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
