name: AutoTrend Atlas

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: autotrend-atlas-pages
  cancel-in-progress: true

jobs:
  build:
    name: Ingest · Score · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore rolling output memory
        uses: actions/cache@v4
        with:
          path: output/
          key: autotrend-output-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            autotrend-output-${{ runner.os }}-

      - name: Build static intelligence site
        run: python app.py

      - name: Keep Pages metadata
        run: |
          test -f output/.nojekyll || touch output/.nojekyll

      - name: Commit updated memory and output
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add output/
          git diff --cached --quiet || git commit -m "chore: refresh intelligence memory [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
