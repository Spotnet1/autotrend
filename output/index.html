<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpotPulse Intelligence | Global Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010409;
            --surface: #0d1117;
            --surface-hover: #161b22;
            --accent: #2f81f7;
            --accent-glow: rgba(47, 129, 247, 0.3);
            --secondary: #d2a8ff;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border: #30363d;
            --positive: #3fb950;
            --negative: #f85149;
            --neutral: #8b949e;
            --hot: #ff7b72;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.4;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        header {
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(1, 4, 9, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-left, .header-right {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .header-right { align-items: flex-end; }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .logo span { color: var(--accent); }

        .utc-clock {
            font-family: 'Outfit', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.05em;
        }

        .last-updated {
            font-size: 0.6rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.55rem;
            font-weight: 900;
            color: var(--positive);
            background: rgba(63, 185, 80, 0.1);
            padding: 0.15rem 0.5rem;
            border-radius: 99px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 5px; height: 5px; background: var(--positive);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        main {
            padding: 1rem;
            padding-bottom: 5rem;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ── Single Line Hero ── */
        .hero {
            margin: 1.5rem 0 2rem;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Top Trending Vertical Scroller (Inline) ── */
        .top-tags-container {
            margin-bottom: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            max-height: 120px;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .top-tags-container::-webkit-scrollbar { display: none; }

        .tag-list-header {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
        }

        .vertical-tag-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .vertical-tag-item:last-child { border-bottom: none; }
        .tag-rank { color: var(--accent); font-family: 'Outfit', sans-serif; width: 25px; }
        .tag-name { flex: 1; margin-left: 0.5rem; }
        .tag-count { color: var(--text-dim); font-size: 0.75rem; }

        /* ── Search ── */
        .search-container {
            margin-bottom: 1.5rem;
            position: sticky;
            top: 4rem;
            z-index: 900;
        }

        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        /* ── Category Scroller ── */
        .cat-scroller {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            padding: 0.1rem;
            scrollbar-width: none;
        }
        .cat-scroller::-webkit-scrollbar { display: none; }

        .cat-pill {
            flex: 0 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
        }

        .cat-pill.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* ── Feed Grid ── */
        .feed-grid {
            display: grid;
            gap: 0.75rem;
        }

        .article-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: background 0.2s;
        }
        .article-card:active { background: var(--surface-hover); }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .source-name {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .trending-badge {
            background: var(--hot);
            color: var(--bg);
            font-size: 0.55rem;
            font-weight: 900;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }
        .card-title a { color: inherit; text-decoration: none; }

        /* ── Card Analytics ── */
        .card-analytics {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
            background: rgba(255,255,255,0.03);
            padding: 0.5rem;
            border-radius: 0.5rem;
        }

        .analytic-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .analytic-label {
            font-size: 0.5rem;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        .analytic-value {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .sentiment-bar-bg {
            height: 4px;
            background: #21262d;
            border-radius: 2px;
            overflow: hidden;
            width: 100%;
        }

        .sentiment-bar-fill { height: 100%; border-radius: 2px; }
        .sentiment-bar-fill.positive { background: var(--positive); }
        .sentiment-bar-fill.negative { background: var(--negative); }
        .sentiment-bar-fill.neutral { background: var(--neutral); }

        .keyword-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
        }

        .kw-chip {
            background: rgba(47, 129, 247, 0.1);
            color: var(--accent);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            border: 1px solid rgba(47, 129, 247, 0.2);
            text-transform: lowercase;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .score-indicator {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        .sentiment-dot { width: 6px; height: 6px; border-radius: 50%; }
        .sentiment-dot.positive { background: var(--positive); box-shadow: 0 0 8px var(--positive); }
        .sentiment-dot.negative { background: var(--negative); box-shadow: 0 0 8px var(--negative); }
        .sentiment-dot.neutral { background: var(--neutral); }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-top: 2.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
        }

        .page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-btn:not(:disabled):hover { border-color: var(--accent); }

        /* ── Bottom Nav ── */
        nav.bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 0.5rem calc(0.75rem + var(--safe-area-bottom));
            z-index: 1001;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.1rem; }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fadeInUp 0.3s ease forwards; }

    </style>
